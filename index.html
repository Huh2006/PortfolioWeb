<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adrian — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SVG filter for subtle hand-drawn wobble -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden">
    <filter id="sketchy">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <!-- ═══ HERO / LANDING ═══ -->
  <div id="heroWrap">
    <canvas id="trailCanvas"></canvas>
    <div class="hero-left">
      <div class="hero-eyebrow anim-in" style="--d:0">
        <span class="eyebrow-line"></span>
        <span>IT Student &amp; Builder</span>
      </div>
      <h1 class="hero-heading">
        <span class="h-line h-hi anim-in" style="--d:1">Hi, I'm</span>
        <span class="h-line h-name anim-in" style="--d:2">Adrian</span>
      </h1>
      <p class="hero-sub anim-in" style="--d:3">
        Building things. Learning more.<br />One project at a time.
      </p>
      <div class="hero-actions anim-in" style="--d:4">
        <button class="btn-ink" id="enterDesktop">
          Enter my workspace
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="hero-right" id="heroRight">
      <canvas id="sketchCanvas" width="480" height="480"></canvas>
    </div>
  </div>

  <!-- ═══ DESKTOP OS ═══ -->
  <div id="desktop" class="hidden">
    <!-- Desktop icon area -->
    <div id="desktopIcons"></div>
    <!-- Window layer -->
    <div id="windowLayer"></div>
    <!-- Taskbar -->
    <div id="taskbar">
      <div class="tb-left">
        <button class="tb-start" id="startBtn">Adrian<span class="dot">.</span></button>
      </div>
      <div class="tb-windows" id="tbWindows"></div>
      <div class="tb-right">
        <button class="tb-admin" id="adminBtn" title="Admin Login">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
            <rect x="2" y="6" width="10" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4.5 6V4a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="tb-logout" id="logoutBtn" title="Back to Home">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 1H3a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2M9 10l3-3-3-3M5 7h7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="tb-clock" id="tbClock"></span>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
  <script src="admin.js"></script>
</body>
</html>
